<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReWear</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oleo+Script:wght@400;700&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/formulario/pedidos.css">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
     
  <style>
      .custom-form-container {
        background-color: #fcf4c5; 
        border-radius: 20px;
        padding: 40px;
        
        max-width: 95%;
        margin: 40px auto;
        min-height: 450px;
      }

      .form-title {
       color: #654321; 
       font-weight: bold;
       margin-bottom: 20px;
      }

      .custom-form-container .form-control, 
      .custom-form-container .form-select {
       border: none;
       border-radius: 4px;
       padding: 12px;
      }

     .right-square-input {
      height: 100%;
      min-height: 200px;
      resize: none;
      }

     .btn-send {
      background-color: #654321;
      color: #ffffff;
      border: none;
      border-radius: 25px;
      padding: 10px 40px;
      font-weight: bold;
      display: block;
      margin: 20px auto 0 auto;
      transition: background-color 0.2s ease;
     }

     .btn-send:hover {
      background-color: #4a3118;
      color: #ffffff;
     }
  </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg diseño-de-navbar">
        <div class="container">
            <a class="navbar-brand" href="">ReWear</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                   <li class="nav-item"><a class="nav-link" href="/Home/homepage.html">Home</a></li>
                   <li class="nav-item"><a class="nav-link" href="/clothes/clothes.html">Clothes</a></li>
                   <li class="nav-item"><a class="nav-link" href="/Miperfil/myprofile.html">My profile</a></li>
                   <li class="nav-item"><a class="nav-link" href="/reviews/reviews.html">Reviews</a></li>
                   <li class="nav-item"><a class="nav-link" href="/aboutus/aboutus.html">About us</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
  <form action="/procesar-personalizacion" method="POST" enctype="multipart/form-data">

    <div class="container mt-3" style="max-width: 1000px;">
      <div id="success-alert" class="alert alert-custom alert-dismissible fade d-none" role="alert">
          <strong>Success!</strong> Your customization order has been submitted successfully. The designer will contact you soon.
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>
 </div>
    

    <div class="custom-form-container">
      <h3 class="form-title">Customization details</h3>
      
      <div class="row g-3">
    
        <div class="col-md-7 d-flex flex-column gap-3 overflow-y-auto">
          
          <div>
            <select id="technique" name="technique" class="form-select" required>
              <option value="" disabled selected>Select method (Embroidery, Screen Print...)</option>
              <option value="embroidery">Custom Embroidery</option>
              <option value="screenprint">Screen Printing</option>
              <option value="sublimation">Sublimation Printing</option>
              <option value="tie-dye">Custom Tie-Dye</option>
              <option value="laser-engraving">Laser Engraving</option>
              <option value="patches">Patch Attachment</option>
          </select>
            
  

          </div>

          <select id="placement" name="placement" class="form-select" required>
              <option value="" disabled selected>Design placement (Chest, Back, Sleeve...)</option>
              <optgroup label="Tops & Jackets">
                 <option value="left-chest">Left Chest</option>
                 <option value="right-chest">Right Chest</option>
                 <option value="center-front">Center Front</option>
                 <option value="full-back">Full Back</option>
                 <option value="upper-back">Upper Back (Below Collar)</option>
                 <option value="left-sleeve">Left Sleeve</option>
                 <option value="right-sleeve">Right Sleeve</option>
              </optgroup>

               <optgroup label="Pants & Shorts">
                 <option value="left-thigh">Left Thigh</option>
                 <option value="right-thigh">Right Thigh</option>
                 <option value="side-seam">Side Seam (Vertical)</option>
                 <option value="back-pocket">Back Pocket</option>
             </optgroup>
          </select>


          <div>
             <select id="fabric" name="fabric" class="form-select">
                <option value="" disabled selected>Select fabric type (Cotton, Polyester...)</option>
                <option value="cotton">100% Cotton</option>
                <option value="polyester">Polyester Blend</option>
             </select>
           </div>


           
           <div>
            <input type="file" id="design-file" name="design-file" class="form-control" accept=".png, .pdf, .ai, .eps" required>
            <div class="form-text text-muted ps-1" style="font-size: 0.8rem;">Upload a photo of your garment  (PNG, PDF, AI, EPS)</div>
          </div>

        </div>

         <div class="col-md-5">
          <textarea id="notes" name="notes" class="form-control right-square-input" placeholder="Enter detailed order instructions, thread/ink colors, specific measurements, or special requests here..." required></textarea>
        </div>
      </div>

      </div>

      <button type="submit" class="btn btn-send shadow-sm">Send</button>
    </form>
 </div>


  <script>
       document.querySelector('form').addEventListener('submit', function(event) {
       event.preventDefault(); 
    
       const alertElement = document.getElementById('success-alert');
       alertElement.classList.remove('d-none');
       alertElement.classList.add('show');
      this.reset();
    
      window.scrollTo({ top: 0, behavior: 'smooth' });

      setTimeout(function() {
     
      window.location.href = "../clothes/clothes.html"; 
      }, 5000); 
      });
  </script>

 
</body>
</html>
