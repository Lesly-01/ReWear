    <script>
        function updateNavbarByAccountType(accountType) {

       const designerRequests = document.getElementById('nav-designer-requests');
       const userOrders = document.getElementById('nav-user-orders');

       if (accountType === 'designer') {

       designerRequests.classList.remove('d-none');
       userOrders.classList.add('d-none');
        } 
       else if (accountType === 'customer') {

      userOrders.classList.remove('d-none');
      designerRequests.classList.add('d-none');
       }}
