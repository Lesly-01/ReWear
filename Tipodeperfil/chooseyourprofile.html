    <main class="container my-5 text-center flex-grow-1">
    
    <h1 class="profile-title fw-bold my-4">Choose your profile</h1>
    
    <div class="row justify-content-center gap-4 my-4">
        
    
        <div class="col-9 col-sm-5 col-md-4 col-lg-3">

            </div>
        </div>

        <div class="col-9 col-sm-5 col-md-4 col-lg-3">

       <div class="d-flex justify-content-center mt-4 px-3">

               Enter
           </a>
       </div>


        
</main>

      
    <script>
    
      const cardDesigner = document.getElementById('card-designer');
      const cardBuyer = document.getElementById('card-buyer');

    
      cardDesigner.addEventListener('click', function() {
      cardDesigner.classList.add('selected'); 
      cardBuyer.classList.remove('selected'); 
      });

    
      cardBuyer.addEventListener('click', function() {
      cardBuyer.classList.add('selected');    
      cardDesigner.classList.remove('selected'); 
      });
  </script>
